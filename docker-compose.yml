services:
  mongo:
    image: mongo:8.0
    container_name: recipehub-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: recipehub
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - recipehub-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: recipehub-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD}@mongo:27017/recipehub?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - recipehub-net

volumes:
  mongo_data:
    name: recipehub_mongo_data

networks:
  recipehub-net:
    driver: bridge